<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mais um</title>
</head>

<body>

    <!-- dúvida enviada pela aluna Isah -->

    <input type="button" value="+1" onclick="maisUm()"><br><br><br><br>
    <h1 id="outPutContador">0</h1>
    
    
    <script>
        let contador = 0;// variável global para armazenar o valor do contador, tem que ficar fora da função para que o valor 
        // seja mantido entre as chamadas da função maisUm(). Se colocar a variável dentro da função, ela seria reinicializada para 0 toda 
        // vez que a função fosse chamada, e o contador não funcionaria corretamente.
        function maisUm() {            
            contador= contador + 1;
            document.getElementById("outPutContador").innerHTML = contador;
        }
    </script>
</body>

</html>
