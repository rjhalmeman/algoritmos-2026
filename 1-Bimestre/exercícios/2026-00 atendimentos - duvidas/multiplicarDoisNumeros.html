<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplicar</title>
</head>

<body>
    <label for="inputX">X</label>
    <input type="number" name="inputX" id="inputX">
    <br>
    <label for="inputY">Y</label>
    <input type="number" name="inputY" id="inputY">
    <br>
    <input type="button" name="botaoMultiplicar" id="botaoMultiplicar" value="Multiplicar dois números" onclick="funcaoMultiplicar()">
    <br>
    <label for="resultado">Resultado</label>
    <p id="resultado">0 </p>

    <script>
        function funcaoMultiplicar() {
            //Entrada de dados para a função
            let x = parseFloat(document.getElementById("inputX").value);

            let y = parseFloat(document.getElementById("inputY").value);
            //processamento
            let mult = x * y;

            document.getElementById("resultado").innerHTML = mult;

        }
    </script>

</body>

</html>
