<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idade</title>
</head>

<body>
    <h1>Programa para calcular o setor por idade</h1>
    <label for="Idade">Idade do nadador</label>
    <input type="number" id="Idade" placeholder="Insira a idade">
    <br>
    <input type="button" value="Classificar" onclick="funcaoClassificar()">
    <br>
    <p id="Resposta"></p>
    <script>
        function euSouAFuncaoQueClassifica(idade) {
            //passe-me a Idade (entrada de dados) e eu te retorno a classificação

            let resposta = "";//local para guardar a resposta da classificação
            if (idade >= 5 && idade <= 7) {
                resposta = "Infantil A"
            }
            else if (idade >= 8 && idade <= 10) {
                resposta = "Infantil B"
            }
            else if (idade >= 11 && idade <= 13) {
                resposta = "Juvenil A"
            } else if (idade >= 14 && idade <= 17) {
                resposta = "Juvenil B"
            } else {
                resposta = "Sênior"
            }
            return resposta; //faltava isso (saída para a função Classificar)
        }
        function funcaoClassificar() {
            debugger
            let I = parseFloat(document.getElementById("Idade").value);
            let V = euSouAFuncaoQueClassifica(I); // o I é a entrada de dados, a idade. O V é a resposta da classificação, ou seja, a saída da função euSouAFuncaoQueClassifica.
            
            document.getElementById("Resposta").innerHTML = V;
        }
    </script>
</body>

</html>
