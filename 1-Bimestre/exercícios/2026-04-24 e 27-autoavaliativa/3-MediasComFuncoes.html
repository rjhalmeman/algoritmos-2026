<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Médias</title>
</head>
<body>
    <!-- versão com uso de funções -->
    <!-- entrada - ler x, y e z e qual opção será usada-->
    <label for="inputX">Valor de X</label>
    <input type="number" id="inputX" placeholder="Valor de X">
    <br>
    <label for="inputY">Valor de Y</label>
    <input type="number" id="inputY" placeholder="Valor de Y">
    <br>
    <label for="inputZ">Valor de Z</label>      
    <input type="number" id="inputZ" placeholder="Valor de Z">
    <br>
    <p>1 - Geométrica</p>
    <p>2 - Ponderada</p>
    <p>3 - Harmônica</p>
    <p>4 - Aritmética</p>
    <label for="inputOpcao">Opção</label>
    <input type="number" id="inputOpcao" placeholder="Opção (1, 2, 3 ou 4)">
    <br>
    <input type="button" value="Calcular" onclick="calcular()">
    <br>
    <label for="resposta">Resposta</label>
    <span id="resposta"></span>

    <script>
        // Função para média geométrica
        function mediaGeometrica(x, y, z) {
            return Math.cbrt(x * y * z); // Raiz cúbica do produto
        }

        // Função para média ponderada
        function mediaPonderada(x, y, z) {
            // Pesos: 1 para x, 2 para y, 3 para z
            return (x + 2 * y + 3 * z) / 6;
        }

        // Função para média harmônica
        function mediaHarmonica(x, y, z) {
            return 3 / (1 / x + 1 / y + 1 / z);
        }

        // Função para média aritmética
        function mediaAritmetica(x, y, z) {
            return (x + y + z) / 3;
        }

        // Função principal que calcula baseado na opção escolhida
        function calcular() {
            // Obtém os valores dos inputs
            const x = parseFloat(document.getElementById('inputX').value);
            const y = parseFloat(document.getElementById('inputY').value);
            const z = parseFloat(document.getElementById('inputZ').value);
            const opcao = parseInt(document.getElementById('inputOpcao').value);

            let resultado;

            // Verifica se todos os valores são números válidos
            if (isNaN(x) || isNaN(y) || isNaN(z)) {
                resultado = "Por favor, insira valores válidos para X, Y e Z!";
                document.getElementById('resposta').textContent = resultado;
                return;
            }

            // Verifica se a opção é válida
            if (isNaN(opcao) || opcao < 1 || opcao > 4) {
                resultado = "Opção inválida! Escolha entre 1, 2, 3 ou 4.";
                document.getElementById('resposta').textContent = resultado;
                return;
            }

            // Verifica valores negativos para média harmônica e geométrica
            if (opcao === 1 && (x <= 0 || y <= 0 || z <= 0)) {
                resultado = "Para média geométrica, todos os valores devem ser positivos!";
                document.getElementById('resposta').textContent = resultado;
                return;
            }

            if (opcao === 3 && (x <= 0 || y <= 0 || z <= 0)) {
                resultado = "Para média harmônica, todos os valores devem ser positivos!";
                document.getElementById('resposta').textContent = resultado;
                return;
            }

            // Chama a função apropriada baseado na opção usando if's
            if (opcao === 1) {
                resultado = mediaGeometrica(x, y, z);
            } else if (opcao === 2) {
                resultado = mediaPonderada(x, y, z);
            } else if (opcao === 3) {
                resultado = mediaHarmonica(x, y, z);
            } else if (opcao === 4) {
                resultado = mediaAritmetica(x, y, z);
            } else {
                resultado = "Erro inesperado!";
            }

            // Exibe o resultado formatado
            if (typeof resultado === 'number') {
                // Formata o resultado para mostrar 2 casas decimais
                document.getElementById('resposta').textContent = resultado.toFixed(2);
            } else {
                document.getElementById('resposta').textContent = resultado;
            }
        }
    </script>
</body>
</html>
