<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conceitos</title>
</head>

<body>
    <label for="inputNota">Nota</label>
    <input type="number" id="inputNota" placeholder="Nota">

    <label for="inputFaltas">Faltas</label>
    <input type="number" id="inputFaltas" placeholder="Faltas">

    <button id="btnCalcular" onclick="funcaoCalcular()">Calcular</button>

    <p id="aviso"></p>
    <p id="resultado"></p>

    <script>
        function funcaoCalcular() {
            const nota = parseFloat(document.getElementById('inputNota').value);
            const faltas = parseInt(document.getElementById('inputFaltas').value); 
            let conceito = calcularConceito(nota, faltas);
            document.getElementById('resultado').textContent = "Conceito: " + conceito;
        }

        function calcularConceito(nota, faltas) {
            if (faltas <= 20) {
                if (nota >= 9) {
                    conceito = 'A';
                } else if (nota >= 7.5) {
                    conceito = 'B';
                } else if (nota >= 5) {
                    conceito = 'C';
                } else if (nota >= 4) {
                    conceito = 'D';
                } else {
                    conceito = 'E';
                }
            } else {
                if (nota >= 9) {
                    conceito = 'B';
                } else if (nota >= 7.5) {
                    conceito = 'C';
                } else if (nota >= 5) {
                    conceito = 'D';
                } else if (nota >= 4) {
                    conceito = 'E';
                } else {
                    conceito = 'E';
                }
            }
            return conceito;
        }
    </script>


</body>

</html>
