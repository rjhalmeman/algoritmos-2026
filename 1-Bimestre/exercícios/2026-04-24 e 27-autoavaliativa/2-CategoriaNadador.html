<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificação de Nadador por Idade</title>

</head>

<body>

    <h1>Classificação de Nadador</h1>
    <label for="idade">Digite a idade do nadador:</label>
    <input type="number" id="idade" placeholder="Ex: 8" min="0" max="120">
    <button onclick="classificar()">Classificar</button>

    <div id="resultado" class="resultado"></div>


    <script>
        function categorizarNadador(idade) {
            let resposta = '';
            if (idade < 5) {
                resposta = 'jovem demais para competir';
            } else if (idade <= 7) {
                resposta = 'Infantil A';
            } else if (idade <= 10) {
                resposta = 'Infantil B';
            } else if (idade <= 13) {
                resposta = 'Juvenil A';
            } else if (idade <= 17) {
                resposta = 'Juvenil B';
            } else {
                resposta = 'Sênior - maiores de 18 anos';
            }
            return resposta;
        }
        function classificar() {
            let idade = parseInt(document.getElementById('idade').value);
            debugger;
            if (idade < 0 || idade > 120 || isNaN(idade)) {
                document.getElementById('resultado').textContent = 'Por favor, insira uma idade válida entre 0 e 120 anos.';
                return;// se a idade for inválida, exibe a mensagem de erro e interrompe a execução da função classificar.
            }
            let categoria = categorizarNadador(idade);

            document.getElementById('resultado').textContent = 'O nadador pertence à categoria: ' + categoria;

        }
    </script>
</body>

</html>
