<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- entrada de dados -->
    <label for="inputAno">Ano</label>
    <input type="number" id="inputAno" placeholder="Ano">

    <!-- input button para fazer o processamento -->
    <input type="button" onclick="calcularBissexto()" value="Ano bissexto?">
<br>
<br>
<br>
    <label for="inputNumero">Ano</label>
    <input type="number" id="inputNumero" placeholder="Número qualquer">

    <!-- input button para fazer o processamento se é ano bissexto-->
    <input type="button" onclick="verifiqueSeEPar()" value="Esse número é par?">


    <!-- //p para exibir o resultado -->
    <h1 id="resultado"></h1>

    <!-- importar as minhas funções. Estou dizendo para o programa ONDE estão as "minhasFuncoes" -->
    <script src="minhasFuncoes.js"></script>

    <script>

        function calcularBissexto() {
            const ano = parseInt(document.getElementById('inputAno').value);
            if (isNaN(ano)) {
                document.getElementById('resultado').textContent = 'Por favor, insira um valor numérico para o ano.';
                return;
            }
            if (ano < 0) {
                document.getElementById('resultado').textContent = 'Por favor, insira um valor válido para o ano (não pode ser negativo).';
                return;
            }
            if (ehBissextoSimples(ano)) {
                document.getElementById('resultado').textContent = ano + ' é um ano bissexto.';
            } else {
                document.getElementById('resultado').textContent = ano + ' não é um ano bissexto.';
            }
        }

        function verifiqueSeEPar() {
            const numero = parseInt(document.getElementById('inputNumero').value);
            if (isNaN(numero)) {
                document.getElementById('resultado').textContent = 'Por favor, insira um valor numérico para o número.';
                return;
            }
            if (ehPar(numero)) {
                document.getElementById('resultado').textContent = numero + ' é um número par.';
            } else {
                document.getElementById('resultado').textContent = numero + ' é um número ímpar.';
            }
        }
    </script>


</body>

</html>
