<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somador</title>
</head>

<body>

    <h1 id="titulo">Programa para somar dois números</h1>
    <label for="inputA">Digite um valor para A</label>
    <input type="number" name="inputA" id="inputA">
    <br>
    <label for="inputB">Digite um valor para B</label>
    <input type="number" name="inputB" id="inputB">
    <br>
    <input type="button" value="Somar" onclick="funcaoCalcular()">
    <br>
    <input type="button" value="Mudar titulo" onclick="funcaoMudar()">
    <br>
    <span id="resposta">0</span>


    <script>
        function funcaoMudar() {
            document.getElementById("titulo").innerHTML = "Mudei o título";
        }

        function somar(x, y) {
            let s = x + y;
            return s;
        }

        function funcaoCalcular() {
            
            let valorA = parseFloat(document.getElementById("inputA").value);
            let valorB = parseFloat(document.getElementById("inputB").value);

            let soma = somar(valorA,valorB)
                document.getElementById("resposta").innerHTML = soma;
        }
    </script>
</body>

</html>
