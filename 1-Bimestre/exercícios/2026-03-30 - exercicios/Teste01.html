<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste01</title>
</head>
<body>
    <input type="number" name="inputValor" id="inputValor">
    <input type="button" value="Calcular" onclick="calcular()">
    <h1 id="resultado">pincel</h1>
    <h1 id="outro">outro elemento</h1>

    <script>
        function calcular() {
            let valor = parseFloat( document.getElementById("inputValor").value);
            let variavelResultado = valor * 3;
            document.getElementById("resultado").innerHTML 
            = "O resultado é: " + variavelResultado;
        }
    </script>
</body>
</html>
