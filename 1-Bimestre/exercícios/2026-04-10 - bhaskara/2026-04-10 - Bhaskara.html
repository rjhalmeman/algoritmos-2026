<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhaskara</title>   
</head>

<body>

    <h1>Fórmula de Bhaskara</h1>

    <!-- Coeficientes A, B, C -->
    <label for="inputA">Valor de A (coeficiente a)</label>

    <input type="number" name="inputA" id="inputA"  >
    <br>

    <label for="inputB">Valor de B (coeficiente b)</label>
    <input type="number" name="inputB" id="inputB"  >
    <br>

    <label for="inputC">Valor de C (coeficiente c)</label>
    <input type="number" name="inputC" id="inputC"  >
    <br>

    <input type="button" name="calcular" id="calcular" value="Calcular Bhaskara" onclick="funcaoCalcular()">
    <br>

    <p id="respX1">X1=</p>
    <p id="respX2">X2=</p>


    <script>
        function funcaoCalcular() {
            // --- ENTRADA: valores dos coeficientes A, B e C ---
            let a = parseFloat(document.getElementById("inputA").value);
            let b = parseFloat(document.getElementById("inputB").value);
            let c = parseFloat(document.getElementById("inputC").value);

            // --- PROTEÇÃO 1: Verificar se A é igual a zero (ou NaN) ---
            // Se A for zero, a equação não é do segundo grau (divisão por zero)
            let respX1 = "";
            let respX2 = "";

            if (a === 0) {
                respX1 = "ERRO: O coeficiente A não pode ser zero. Equação não é do segundo grau.";
                respX2 = "";  // sem resposta para X2 nesse caso
            } else {

                // --- CÁLCULO DO DELTA (discriminante) ---
                let delta = (b ** 2) - (4 * a * c);

                // --- PROTEÇÃO 2: Verificar se delta é negativo ---
                if (delta < 0) {
                    respX1 = "ERRO: Delta é negativo (Δ = " + delta.toFixed(4) + "). Não existem raízes reais.";
                    respX2 = "";  // sem resposta para X2 nesse caso
                } else { //delta é zero ou positivo, podemos calcular as raízes                   
                    let raizDelta = Math.sqrt(delta);
                    let x1 = (-b + raizDelta) / (2 * a);
                    let x2 = (-b - raizDelta) / (2 * a);
                    respX1 = "X1 = " + x1.toFixed(4); //formatação para 4 casas decimais
                    respX2 = "X2 = " + x2.toFixed(4); //formatação para 4 casas decimais
                }
            }
            document.getElementById("respX1").innerHTML = respX1;
            document.getElementById("respX2").innerHTML = respX2;
        }
    </script>
</body>

</html>
