<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inverter Palavra</title>
</head>

<body>
    <h1>Inverter Palavra - Laço For</h1>
    <input type="text" id="palavra" placeholder="Digite uma palavra">
    <button onclick="inverter()">Inverter</button>
    <h1 id="resultado"></h1>

    <script>
        function inverterPalavra(palavra) {
            let invertida = '';
            for (let i = palavra.length - 1; i >= 0; i--) {
                invertida = invertida + palavra[i];
            }
            return invertida;
        }

        function inverter() {
            let palavra = document.getElementById('palavra').value;
            let invertida = inverterPalavra(palavra);
            document.getElementById('resultado').innerHTML = "Palavra original..: " + palavra + "<br>Palavra invertida: " + invertida;
        }    
    </script>

</body>

</html>
