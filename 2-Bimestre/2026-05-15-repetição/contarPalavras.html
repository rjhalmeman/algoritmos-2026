<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contar Palavras</title>
</head>

<body>
    <h1>Contador de Palavras</h1>

    <label for="texto">Digite um texto:</label><br><br>
    <input type="text" id="texto"><br><br>

    <button onclick="contarPalavras()">Contar Palavras</button><br><br>
    <label for="resultado">Resultado:</label><br>
    <p id="resultado"></p>

    <script>
        function contarPalavras() {
            let texto = document.getElementById("texto").value;
            let quantidade = 1; // Começa com 1 porque a última palavra não é seguida por um espaço
            let i = 0;
            while (i < texto.length) {
                if (texto[i] == ' ') {
                    quantidade = quantidade + 1;
                }
                i = i + 1;
            }
            let mensagem = "Total de palavras: " + quantidade;
            document.getElementById("resultado").innerHTML = mensagem;
        }
    </script>
</body>

</html>
